<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ store_name }} お渡し番号モニター</title>
  <meta http-equiv="refresh" content="{{ reload_interval }}">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #f3f1ed;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      text-align: center;
    }

    .container {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: 18px 12px 40px;
    }

    h1 {
      margin: 0;
      color: #b40000;
      font-size: clamp(2rem, 6vw, 3.8rem);
      font-weight: 900;
    }

    .subtext {
      margin-top: 10px;
      color: #666;
      font-size: clamp(1rem, 2.5vw, 1.8rem);
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: 20px;
    }

    h2 {
      font-size: clamp(2rem, 5vw, 3rem);
      margin: 0;
      font-weight: 900;
    }

    /* ★ここが一番重要（完全中央） */
    .big-number {
      width: min(92vw, 760px);
      aspect-ratio: 3 / 2;

      border: 6px solid #333;
      border-radius: 20px;
      background: #f8f8f8;

      display: flex;
      justify-content: center;
      align-items: center;

      font-size: clamp(5rem, 20vw, 11rem);
      font-weight: 900;
      color: #e10000;

      line-height: 1;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      width: 100%;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .label {
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      font-weight: bold;
      margin-bottom: 5px;
    }

    .value {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      padding: 10px 14px;
      border: 2px solid #ccc;
      border-radius: 10px;
      background: #fff;
      min-width: 100px;
    }

    .history {
      width: 100%;
      margin-top: 10px;
    }

    .history h3 {
      font-size: clamp(1.6rem, 4vw, 2.5rem);
      margin-bottom: 10px;
    }

    .history-numbers {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      min-height: 40px;
    }

    .number {
      padding: 8px 12px;
      border: 2px solid #ccc;
      border-radius: 8px;
      background: #fff;
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: bold;
      min-width: 50px;
    }

    .login-link {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #6a38b0;
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .stats {
        gap: 15px;
      }

      .value {
        min-width: 80px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🍖 {{ store_name }} お渡し番号 🍖</h1>
    <div class="subtext">店頭でもスマホでもご確認いただけます</div>

    <main>
      <section>
        <h2>呼び出し中番号</h2>
        <div class="big-number">{{ latest }}</div>
      </section>

      <section class="stats">
        <div class="stat">
          <div class="label">お待ち人数</div>
          <div class="value">{{ wait_count }}人</div>
        </div>
        <div class="stat">
          <div class="label">目安待ち時間</div>
          <div class="value">{{ wait_count * wait_time_unit }}分</div>
        </div>
      </section>

      <section class="history">
        <h3>呼び出し済み番号</h3>
        <div class="history-numbers">
          {% for n in history %}
            <div class="number">{{ n }}</div>
          {% endfor %}
        </div>
      </section>
    </main>

    <a href="/monitor_login" class="login-link">設定画面ログイン</a>
  </div>
</body>
</html>
