<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ store_name }} お渡し番号モニター</title>
  <link rel="stylesheet" href="/static/monitor.css">
  <meta http-equiv="refresh" content="{{ reload_interval }}">

<style>
.big-number {
  border: 5px solid #333;
  border-radius: 12px;
  background-color: #fff;
  box-sizing: border-box;

  width: min(92vw, 520px);
  min-height: 180px;
  padding: 10px 16px;

  display: flex;
  align-items: center;
  justify-content: center;

  text-align: center;
  line-height: 1;
  font-weight: 700;
  font-size: clamp(4.8rem, 22vw, 9rem);

  margin: 0 auto;
  overflow: hidden;
}

/* 統計表示 */
.stats {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 20px;
}

.stat {
  text-align: center;
}

.label {
  display: block;
  font-weight: bold;
  font-size: 2rem;
  margin-bottom: 5px;
}

.value {
  font-size: 1.8rem;
  padding: 5px 10px;
  min-width: 80px;
  background: #fff;
  border-radius: 8px;
  border: 2px solid #ccc;
  display: inline-block;
}

/* スマホ微調整 */
@media (max-width: 600px) {
  .big-number {
    width: 94vw;
    min-height: 160px;
    padding: 8px 12px;
    font-size: clamp(5.2rem, 24vw, 7.5rem);
  }

  .label {
    font-size: 1.4rem;
  }

  .value {
    font-size: 1.3rem;
  }
}

/* スピンボタン非表示 */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

input[type=number] {
  -moz-appearance: textfield;
}
</style>
</head>

<body>
  <div class="container">
    <header>
      <h1>🍖 {{ store_name }} お渡し番号 🍖</h1>
      <p class="subtext">店頭でもスマホでもご確認いただけます</p>
    </header>

    <main>
      <section class="now-calling">
        <h2>呼び出し中番号</h2>
        <div class="big-number">{{ latest }}</div>
      </section>

      <section class="stats">
        <div class="stat">
          <span class="label">お待ち人数</span>
          <span class="value">{{ wait_count }}人</span>
        </div>
        <div class="stat">
          <span class="label">目安待ち時間</span>
          <span class="value">{{ wait_count * wait_time_unit }}分</span>
        </div>
      </section>

      <section class="history">
        <h3>呼び出し済み番号</h3>
        <div class="history-numbers">
          {% for n in history %}
            <span class="number">{{ n }}</span>
          {% endfor %}
        </div>
      </section>
    </main>

    <br>
    <a href="/monitor_login" style="font-size: 0.8rem;">設定画面ログイン</a>

    <footer>
    </footer>
  </div>
</body>
</html>
</html>
